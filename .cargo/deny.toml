# cargo-deny configuration for Apodokimos
# Documentation: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "wasm32-unknown-unknown" },
]

[licenses]
version = 2
# Suppress warnings about allowed licenses not currently used by dependencies
unused-allowed-license = "allow"
allow = [
    "AGPL-3.0",
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-3.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[advisories]
version = 2
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/paritytech/substrate",
    "https://github.com/paritytech/polkadot-sdk",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Deny specific crates with known issues or unwanted dependencies
[[bans.deny]]
name = "openssl"
# Use rustls instead

[[bans.deny]]
name = "cmake"
# Prefer cc crate
