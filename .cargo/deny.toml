# cargo-deny configuration for Apodokimos
# Documentation: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "wasm32-unknown-unknown" },
]

[licenses]
version = 2
allow = [
    "AGPL-3.0",
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-DFS-2016",
]

deny = [
    "GPL-2.0",
    "GPL-3.0",
    "Proprietary",
    "UNLICENSED",
]

exceptions = [
    # Substrate pallets are typically GPL-3.0, but we use them as dependencies
    # Each exception must be explicitly reviewed
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[advisories]
version = 2
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/paritytech/substrate",
    "https://github.com/paritytech/polkadot-sdk",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Deny specific crates with known issues or unwanted dependencies
[[bans.deny]]
name = "openssl"
# Use rustls instead

[[bans.deny]]
name = "cmake"
# Prefer cc crate

[advisories.ignore]
# None currently
