name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          targets: wasm32-unknown-unknown,x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --target x86_64-unknown-linux-gnu

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          targets: wasm32-unknown-unknown,x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets --target x86_64-unknown-linux-gnu

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: clippy
          targets: wasm32-unknown-unknown,x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --target x86_64-unknown-linux-gnu -- -D warnings
