name: Cargo Deny

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deny:
    name: License / Advisory / Ban Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
