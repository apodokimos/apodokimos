name: Whitepaper Placeholder Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  placeholder-lint:
    name: Check for placeholder strings in WHITEPAPER/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if placeholder strings found in WHITEPAPER/
        run: |
          set -euo pipefail
          placeholders=(
            '<TO-BE-ASSIGNED-AT-ANCHOR>'
            'TODO: ASSIGN DOI'
            'PLACEHOLDER'
          )
          found=0
          for ph in "${placeholders[@]}"; do
            if grep -rni "$ph" WHITEPAPER/; then
              echo "ERROR: placeholder string found: $ph"
              found=1
            fi
          done
          if [ "$found" -ne 0 ]; then
            echo "Failing because placeholder strings were detected in WHITEPAPER/ artifacts."
            exit 1
          fi
          echo "No placeholder strings found in WHITEPAPER/."
